<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EP44｜互動式 AI 學習地圖</title>
  <style>
  :root{--ink:#242a36;--muted:#778091;--line:#e3e6ec;--violet:#7474e8}*{box-sizing:border-box}body{margin:0;color:var(--ink);background:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif}button,input,select{font:inherit}button{cursor:pointer}
  .top{height:64px;display:flex;align-items:center;gap:12px;padding:10px clamp(14px,4vw,42px);color:#fff;background:linear-gradient(100deg,#fa746b,#d963bd 48%,#7072ed)}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;color:#6f5ed7;background:#fff;font-size:12px;font-weight:950}.brand{display:grid;gap:1px}.brand b{font-size:16px}.brand span{font-size:11px;opacity:.82}.score{margin-left:auto;padding:8px 10px;border:1px solid #ffffff55;border-radius:9px;background:#352b711f;font-size:12px;font-weight:800}
  .controls{display:grid;grid-template-columns:minmax(180px,300px) minmax(160px,1fr) auto;gap:9px;padding:10px clamp(12px,4vw,42px);border-bottom:1px solid var(--line);background:#fff}.field{height:43px;display:flex;align-items:center;gap:8px;padding:0 11px;border:1px solid #cfd4dc;border-radius:8px}.field span{color:var(--muted);font-size:11px;font-weight:800;white-space:nowrap}.field input,.field select{width:100%;border:0;outline:0;background:transparent;font-weight:700}.filter{border:0;border-radius:8px;padding:0 17px;color:#fff;background:var(--violet);font-weight:850}
  main{max-width:1280px;margin:auto;padding:32px clamp(12px,4vw,42px) 60px}.heading{display:flex;justify-content:space-between;align-items:end;gap:24px;margin-bottom:18px}.heading small{display:block;margin-bottom:6px;color:#6a61c7;font-weight:900;letter-spacing:.12em}.heading h1{margin:0;font-size:clamp(25px,3vw,38px)}.heading p{max-width:450px;margin:0;color:var(--muted);line-height:1.6}
  .viewport{overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:#fff;box-shadow:0 10px 30px #2d365014;scrollbar-color:#adb2bf #f0f1f4}.graph{position:relative;width:1180px;height:700px;background:linear-gradient(135deg,#fff,#fbfcff)}.zone{position:absolute;border-radius:10px;padding:14px 16px;font-size:12px;font-weight:850;letter-spacing:.05em}.zt{left:25px;top:35px;width:400px;height:340px;color:#4a9f68;background:#eef9f1}.zi{left:25px;top:405px;width:410px;height:250px;color:#cc8549;background:#fff7ee}.za{left:720px;top:35px;width:430px;height:620px;color:#a35bb3;background:#f8effa}.zu{left:460px;top:470px;width:255px;height:185px;color:#5e8fb4;background:#eff6fb}.lines{position:absolute;inset:0;width:1180px;height:700px}.lines line{stroke:#9ca3af;stroke-width:1.6;stroke-dasharray:6 6}
  .node{position:absolute;z-index:3;width:150px;border:0;background:transparent;text-align:center;transform:translate(-50%,-50%)}.dot{display:grid;place-items:center;width:44px;height:44px;margin:auto;border:3px solid #fff;border-radius:50%;color:#fff;background:var(--c);box-shadow:0 3px 10px #30384c28;font-weight:950}.node b{display:block;margin-top:7px;font-size:12px;line-height:1.35}.node small{display:block;margin-top:3px;color:#727a89;font-size:10px}.node:hover .dot,.node.active .dot{outline:4px solid #7068db2b}.node.done .dot::after{content:"✓"}
  .hint{display:none;padding:10px;text-align:center;color:#7169b3;font-size:12px;font-weight:800}.links{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.links a{padding:9px 12px;border-radius:9px;color:#535db4;background:#f0f1ff;text-decoration:none;font-size:12px;font-weight:800}
  dialog{width:min(820px,calc(100% - 24px));max-height:88vh;padding:0;border:0;border-radius:20px;box-shadow:0 30px 90px #11182766}dialog::backdrop{background:#11182799}.modal{padding:24px}.mh{display:flex;justify-content:space-between;gap:15px}.tag{display:inline-block;padding:5px 9px;border-radius:99px;color:#fff;background:var(--c);font-size:11px;font-weight:850}.close{width:36px;height:36px;border:0;border-radius:50%;background:#eef0f4}.source{color:var(--muted);font-size:12px}.modal img{display:block;width:100%;margin:14px 0;border-radius:12px}.facts{display:grid;grid-template-columns:1fr 1fr;gap:12px}.fact{padding:15px;border-radius:12px;background:#f5f6f8}.fact h3{margin:0 0 7px;font-size:15px}.fact p,.modal li{color:#4f5868;line-height:1.65}.mark{width:100%;margin-top:14px;padding:12px;border:0;border-radius:10px;color:#fff;background:#746de0;font-weight:850}
  @media(max-width:650px){.top{padding:9px 11px}.brand span{display:none}.score{padding:6px 8px}.controls{grid-template-columns:1fr auto;padding:9px}.controls .field:first-child{grid-column:1/-1}.heading{display:block}.heading p{margin-top:8px}.viewport{margin-inline:-12px;border-inline:0;border-radius:0}.hint{display:block}.facts{grid-template-columns:1fr}main{padding-top:25px}}
  </style>
</head>
<body>
  <header class="top"><div class="logo">EP44</div><div class="brand"><b>互動式 AI 學習地圖</b><span>2026 上半年一定會的 AI 技能</span></div><div class="score" id="score">0／13 已複習</div></header>
  <section class="controls"><label class="field"><span>學習路線</span><select id="group"><option>全部</option><option>文字篇</option><option>生圖篇</option><option>AI Agent篇</option><option>自動化篇</option></select></label><label class="field"><span>搜尋</span><input id="q" placeholder="工具或觀念"></label><button class="filter" id="reset">重設</button></section>
  <main><div class="heading"><div><small>知識地圖／學習路線</small><h1>從一個節點，沿線找到下一步</h1></div><p>每個圓點都是一個課堂主題。點一下才展開投影片、白話解釋與行動步驟。</p></div><div class="viewport" id="viewport"><div class="graph" id="graph"></div><div class="hint">← 在地圖內左右滑動查看完整路線 →</div></div><div class="links"><a href="課堂筆記_EP44.md">詳細課堂筆記</a><a href="逐字稿_整理版.md">整理版逐字稿</a><a href="逐字稿_時間碼原始版.txt">時間碼逐字稿</a></div></main>
  <dialog id="dialog"><div class="modal" id="modal"></div></dialog>
  <script>
  const colors={coral:'#ef6c61',blue:'#2d86d7',green:'#31a866',purple:'#a22bb5',orange:'#e58a35'};
  const topics=[
  ['overview','總覽','四大 AI 能力地圖',1,'00:01:01','coral','AI 像一組新的辦公室同事：有人寫字、有人畫圖、有人接手任務，也有人讓流程重複運轉。','本課把實用 AI 能力分成文字處理、圖像生成、AI Agent 與流程自動化。',['選一個常重複的工作','判斷它屬於內容、圖片、任務或流程','先完成手動流程，再考慮自動化']],
  ['knowledge','文字篇','專案、Gem、Notebooks 與 Markdown',3,'00:02:58','blue','專案是廚房，Gem 是助手，Notebook 是食材櫃，Markdown 是通用標籤。','集中資料、保留脈絡並以 Markdown 保存，能降低資料散落與平台綁定。',['建立單一課程專案','分開標示來源與自己的筆記','重要輸出另存 Markdown']],
  ['gemini','文字篇','Gemini × NotebookLM',4,'00:20:53','blue','Gemini 像研究助理；NotebookLM 像能指出出處的圖書館員。','Gemini 側重生成與互動；NotebookLM 側重指定來源的摘要、問答與追溯。',['先放可信來源','再延伸與改寫','交付前回到來源核對']],
  ['docs','文字篇','DOCX、Excel 文件輸出',5,'00:14:46','blue','聊天是討論，DOCX 與 Excel 才是能交付、編修的成果。','效率來自可交付格式；輸出後仍要核對欄位、公式、引用與格式。',['指定欄位與格式','檢查公式與結構','保留可編修版本']],
  ['models','生圖篇','Nano Banana × ChatGPT Image',7,'00:27:09','green','一位擅長忠實細節，一位擅長語意、文字與創意構圖。','不同影像模型各有優勢，應依任務驗收條件選擇。',['先定義驗收條件','用同一需求比較模型','保留提示詞與版本']],
  ['revision','生圖篇','生圖修正的兩條路',8,'00:34:49','green','可以請 AI 局部重畫，也可以拆成圖層精準調整。','局部重畫適合快修；Canva 圖層適合品牌規範與完稿。',['列出保留與可改動區域','小改先局部重畫','定稿前拆圖層檢查']],
  ['codex','AI Agent篇','Codex',12,'00:48:15','purple','像能查看檔案與工具後完成任務的數位同事。','Codex 能理解程式庫、修改程式、執行命令並處理多步任務。',['交代目標與驗收','先讀真實檔案','完成後測試差異']],
  ['opencode','AI Agent篇','OpenCode',11,'00:53:21','purple','像坐在終端機旁的工程夥伴。','OpenCode 是能讀寫專案、操作終端並支援多模型的開源程式 Agent。',['先讓 Agent 重述任務','查看變更範圍','用 Git 保留回復點']],
  ['claude','AI Agent篇','Claude Code',13,'00:53:21','purple','像先讀完整案卷再動筆的資深工程師。','Claude Code 能閱讀程式庫、生成、重構、除錯與協助測試。',['提供專案規範','大修改拆段','補上關鍵測試']],
  ['antigravity','AI Agent篇','Antigravity',14,'00:53:21','purple','像把大目標拆包、分工再接回流程的專案經理。','核心是任務拆解、工具串接、流程自動化與多 Agent 協作。',['畫出任務依賴','定義輸入輸出','設定人工檢查點']],
  ['office','AI Agent篇','AI × 微軟文書工具',15,'00:51:57','purple','AI 準備初稿，PPT、Excel、Word 完成正式加工。','AI 可協助簡報架構、資料分析、公式、長文與格式整理。',['一起交代資料與格式','核對數據公式','正式工具完成排版']],
  ['mcp','AI Agent篇','NotebookLM 兩種連結途徑',16,'00:25:38／00:48:55','purple','直連像走進圖書館；MCP 像替 Agent 辦借書證。','可直接使用 NotebookLM，也可透過 MCP 加入 Agent 工作流。',['先用直連確認品質','挑值得自動化的步驟','限制可存取範圍']],
  ['gas','自動化篇','Google Apps Script',18,'00:57:02（未完整講授）','orange','GAS 像 Google Workspace 裡的小管家。','GAS 是以 JavaScript 為基礎、可串接 Google 服務的雲端自動化平台。',['選低風險重複任務','寫清楚觸發條件','加入錯誤紀錄與測試']]
  ].map(x=>({id:x[0],group:x[1],title:x[2],slide:x[3],time:x[4],color:x[5],analogy:x[6],definition:x[7],actions:x[8]}));
  const pos={overview:[590,342],knowledge:[120,168],gemini:[315,118],docs:[315,270],models:[128,530],revision:[330,570],codex:[780,242],opencode:[1015,110],claude:[1035,245],antigravity:[1035,390],office:[790,445],mcp:[965,570],gas:[590,610]};
  const edges=[['overview','knowledge'],['knowledge','gemini'],['knowledge','docs'],['overview','models'],['models','revision'],['overview','codex'],['codex','opencode'],['codex','claude'],['codex','antigravity'],['codex','office'],['codex','mcp'],['overview','gas']];
  let done=JSON.parse(localStorage.getItem('ep44-progress-clean')||'[]');const $=id=>document.getElementById(id);
  function visible(t){const g=$('group').value,q=$('q').value.trim().toLowerCase();return(g==='全部'||t.group===g||t.id==='overview')&&(!q||JSON.stringify(t).toLowerCase().includes(q))}
  function render(){const shown=topics.filter(visible),ids=new Set(shown.map(t=>t.id));const lines=edges.filter(([a,b])=>ids.has(a)&&ids.has(b)).map(([a,b])=>`<line x1="${pos[a][0]}" y1="${pos[a][1]}" x2="${pos[b][0]}" y2="${pos[b][1]}"></line>`).join('');const nodes=shown.map(t=>`<button class="node ${done.includes(t.id)?'done':''}" style="--c:${colors[t.color]};left:${pos[t.id][0]}px;top:${pos[t.id][1]}px" onclick="openTopic('${t.id}')"><span class="dot"></span><b>${t.title}</b><small>投影片 ${t.slide}・${t.time}</small></button>`).join('');$('graph').innerHTML=`<div class="zone zt">文字與知識管理</div><div class="zone zi">圖像生成與修正</div><div class="zone za">AI Agent 與工具協作</div><div class="zone zu">流程自動化</div><svg class="lines" viewBox="0 0 1180 700">${lines}</svg>${nodes}`;$('score').textContent=`${done.length}／${topics.length} 已複習`}
  function openTopic(id){const t=topics.find(x=>x.id===id);$('modal').innerHTML=`<div class="mh"><div><span class="tag" style="--c:${colors[t.color]}">${t.group}</span><h2>${t.title}</h2><p class="source">投影片 ${t.slide}・錄影 ${t.time}</p></div><button class="close" onclick="dialog.close()">×</button></div><img src="slide-${t.slide}.png" alt="投影片 ${t.slide}"><div class="facts"><section class="fact"><h3>先用生活比喻理解</h3><p>${t.analogy}</p></section><section class="fact"><h3>正式定義</h3><p>${t.definition}</p></section></div><h3>立即可做</h3><ol>${t.actions.map(a=>`<li>${a}</li>`).join('')}</ol><button class="mark" onclick="toggle('${t.id}')">${done.includes(t.id)?'取消完成':'標示已複習'}</button>`;$('dialog').showModal()}
  function toggle(id){done=done.includes(id)?done.filter(x=>x!==id):[...done,id];localStorage.setItem('ep44-progress-clean',JSON.stringify(done));render();$('dialog').close()}$('group').onchange=render;$('q').oninput=render;$('reset').onclick=()=>{$('group').value='全部';$('q').value='';render()};$('dialog').onclick=e=>{if(e.target===$('dialog'))$('dialog').close()};render();
  </script>
</body></html>
